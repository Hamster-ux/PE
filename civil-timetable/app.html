<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#176b5a"><title>토목기사 인강 시간표</title><style>
*{box-sizing:border-box}body{margin:0;background:#f3f7f6;color:#17332d;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif}.app{max-width:680px;margin:auto;padding:8px 8px 92px}.hero{background:linear-gradient(135deg,#145447,#21846f);color:#fff;padding:18px;border-radius:23px;box-shadow:0 12px 30px #17493d22}.row{display:flex;justify-content:space-between;gap:12px}.hero h1{margin:4px 0 7px;font-size:28px}.hero p{margin:0;opacity:.84}.dday{text-align:right;font-size:25px;font-weight:900}.dday small{display:block;font-size:11px;font-weight:500;opacity:.8}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:15px}.stat{padding:10px;background:#ffffff1f;border:1px solid #ffffff22;border-radius:14px}.stat small{display:block;opacity:.75}.card{background:#fff;margin-top:12px;padding:14px;border-radius:19px;box-shadow:0 10px 28px #17493d16}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}.head h2{margin:0;font-size:20px}.muted{color:#71827d;font-size:13px}.badge,.chip{display:inline-block;background:#e4f3ef;color:#176b5a;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:800}.summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}.summary div{background:#f7faf9;border:1px solid #dfe8e5;border-radius:13px;padding:11px}.summary small{display:block;color:#71827d}.summary b{font-size:18px}.carry-title{margin-top:10px;padding:12px;border:1px solid #eddba4;background:#fffaf0;border-radius:14px}.subject{border:1px solid #dfe8e5;border-radius:16px;padding:13px;margin-top:10px}.subject.done{background:#edf7f4}.subject h3{margin:0 0 4px}.checks{display:grid;gap:8px;margin-top:10px}.check{display:flex;align-items:center;gap:10px;min-height:48px;padding:10px;border:1px solid #dfe8e5;border-radius:12px;background:#fbfcfc}.check.on{background:#e4f3ef;border-color:#afd7cc}.check input{display:none}.box{width:24px;height:24px;border:2px solid #b6c7c2;border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:900}.check.on .box{background:#176b5a;border-color:#176b5a}.check span:nth-child(3){flex:1;font-weight:800}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}button,input,select{font:inherit}button{border:0;border-radius:11px;min-height:42px;font-weight:850}.primary{background:#176b5a;color:#fff}.light{background:#e9efed;color:#17332d}.danger{background:#f8e1e1;color:#b33c3c}.review{background:#fffaf0;border-color:#eddba4}.review .check.on{background:#fff0bd}.progress{margin-top:12px}.prow{display:flex;justify-content:space-between;font-size:13px;font-weight:800}.bar{height:9px;background:#edf2f0;border-radius:999px;overflow:hidden;margin-top:6px}.bar i{display:block;height:100%;background:linear-gradient(90deg,#176b5a,#61bba5)}.view{display:none}.view.on{display:block}.schedule{border:1px solid #dfe8e5;border-radius:15px;padding:13px;margin-top:9px}.schedule.review{background:#fffaf0}.chips span{margin:4px 4px 0 0}.field{margin-top:10px}.field label{display:block;font-size:12px;font-weight:800;color:#71827d;margin-bottom:5px}.field input,.field select{width:100%;min-height:44px;border:1px solid #dfe8e5;border-radius:11px;padding:9px;background:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.setting{border:1px solid #dfe8e5;border-radius:15px;padding:12px;margin-top:10px}.setting h3{margin:0}.nav{position:fixed;left:50%;bottom:max(9px,env(safe-area-inset-bottom));transform:translateX(-50%);width:min(520px,calc(100% - 18px));display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:7px;background:#fffffff2;border:1px solid #dfe8e5;border-radius:19px;box-shadow:0 14px 35px #17493d2b;backdrop-filter:blur(12px)}.nav button{background:transparent;color:#71827d}.nav button.on{background:#176b5a;color:#fff}.empty{text-align:center;color:#71827d;padding:22px}.notice{background:#eef7f4;color:#285f52;padding:11px;border-radius:13px;margin-top:11px;font-size:12px;line-height:1.6}@media(max-width:430px){.app{padding:7px 7px 90px}.hero{padding:16px}.hero h1{font-size:26px}.dday{font-size:23px}.grid{grid-template-columns:1fr}}
</style></head><body><main class="app"><section class="hero"><div class="row"><div><p>2027 토목기사 필기 준비</p><h1>인강 시간표</h1><p>2과목 × 3일 + 전체 복습</p></div><div class="dday" id="dday">D-<small id="examLabel"></small></div></div><div class="stats"><div class="stat"><small>시작일</small><b id="startStat"></b></div><div class="stat"><small>오늘 체크</small><b id="todayStat">0/0</b></div><div class="stat"><small>전체 진도</small><b id="allStat">0%</b></div></div></section>
<section id="today" class="view on"><div class="card"><div class="head"><div><h2 id="todayTitle">오늘 할 인강</h2><div class="muted" id="todayDate"></div></div><span class="badge" id="cycleBadge"></span></div><div class="summary"><div><small>예상 재생시간</small><b id="timeStat">0분</b></div><div><small>오늘 완료율</small><b id="rateStat">0%</b></div></div><div id="todayContent"></div></div><div class="card"><div class="head"><h2>과목별 진도</h2></div><div id="progress"></div></div></section>
<section id="schedule" class="view"><div class="card"><div class="head"><div><h2>시간표</h2><div class="muted">시작일부터 32일</div></div></div><div id="scheduleList"></div></div></section>
<section id="settings" class="view"><div class="card"><div class="head"><div><h2>설정</h2><div class="muted">시험일과 강의 수를 수정할 수 있어요.</div></div></div><div class="grid"><div class="field"><label>공부 시작일</label><input id="startDate" type="date"></div><div class="field"><label>시험일</label><input id="examDate" type="date"></div></div><div id="subjectSettings"></div><div class="notice">체크하지 않은 강의는 다음날부터 자동으로 ‘이월된 강의’에 표시됩니다. 이월 강의를 또 못 들으면 계속 다음날로 넘어갑니다.</div><div class="actions"><button class="primary" id="saveBtn">설정 저장</button><button class="danger" id="resetBtn">체크 초기화</button></div></div></section></main>
<nav class="nav"><button class="on" data-v="today">오늘</button><button data-v="schedule">시간표</button><button data-v="settings">설정</button></nav>
<script>
const DEF={startDate:'2026-07-01',examDate:'2027-01-01',subjects:[{id:'hydro',name:'수리수문학',total:45,per:3,day:0},{id:'soil',name:'토질 및 기초',total:46,per:3,day:0},{id:'water',name:'상하수도공학',total:29,per:2,day:1},{id:'survey',name:'측량학',total:42,per:3,day:1},{id:'mech',name:'응용역학',total:53,per:3,day:2},{id:'struct',name:'철근콘크리트 및 강구조',total:null,per:3,day:2}],checks:{},reviews:{}};
const K='civilPlannerWeb1',$=x=>document.getElementById(x),pad=n=>String(n).padStart(2,'0');let S=(()=>{try{let x=JSON.parse(localStorage.getItem(K));return x?{...structuredClone(DEF),...x,subjects:x.subjects||structuredClone(DEF.subjects),checks:x.checks||{},reviews:x.reviews||{}}:structuredClone(DEF)}catch{return structuredClone(DEF)}})();
const save=()=>localStorage.setItem(K,JSON.stringify(S));function date(s){let[a,b,c]=s.split('-').map(Number);return new Date(a,b-1,c)}function iso(d){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function diff(a,b){return Math.floor((Date.UTC(a.getFullYear(),a.getMonth(),a.getDate())-Date.UTC(b.getFullYear(),b.getMonth(),b.getDate()))/864e5)}function add(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x}function fmt(d){return new Intl.DateTimeFormat('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'}).format(d)}function cycle(d){let n=diff(d,date(S.startDate));return n<0?null:n%4}function range(s,d){let n=diff(d,date(S.startDate));if(n<0||n%4!==s.day)return null;let i=Math.floor(n/4),a=i*s.per+1,b=s.total?Math.min(a+s.per-1,s.total):a+s.per-1;if(s.total&&a>s.total)return[];return Array.from({length:b-a+1},(_,k)=>a+k)}function key(id,n){return id+':'+n}function checked(s){return Object.keys(S.checks).filter(k=>k.startsWith(s.id+':')).length}
function carry(d){let out=[],cur=date(S.startDate);while(cur<d){let c=cycle(cur);if(c!==null&&c!==3)S.subjects.filter(s=>s.day===c).forEach(s=>{let r=range(s,cur);if(!r||!r.length)return;let left=r.filter(n=>!S.checks[key(s.id,n)]);if(left.length)out.push({s,date:new Date(cur),lectures:left})});cur.setDate(cur.getDate()+1)}return out}
function info(d=new Date){let c=cycle(d),co=carry(d),coCount=co.reduce((a,x)=>a+x.lectures.length,0);if(c===null)return{c,total:0,done:0,subs:[],co};if(c===3){let done=S.subjects.filter(s=>S.reviews[iso(d)+':'+s.id]).length;return{c,total:6+coCount,done,subs:[],co}}let subs=S.subjects.filter(s=>s.day===c).map(s=>({s,r:range(s,d)})).filter(x=>x.r&&x.r.length),all=subs.flatMap(x=>x.r.map(n=>key(x.s.id,n)));return{c,total:all.length+coCount,done:all.filter(k=>S.checks[k]).length,subs,co}}
function subjectCard(s,lectures,meta,target){let done=lectures.filter(n=>S.checks[key(s.id,n)]).length,c=document.createElement('div');c.className='subject '+(done===lectures.length?'done':'');c.innerHTML=`<div class="row"><div><h3>${s.name}</h3><div class="muted">${meta}</div></div><b>${done}/${lectures.length}</b></div><div class="checks"></div><div class="actions"><button class="primary all">모두 체크</button><button class="light clear">전체 해제</button></div>`;let list=c.querySelector('.checks');lectures.forEach(n=>{let on=!!S.checks[key(s.id,n)],l=document.createElement('label');l.className='check '+(on?'on':'');l.innerHTML=`<input type="checkbox" ${on?'checked':''}><span class="box">${on?'✓':''}</span><span>${n}강 인강</span><small class="muted">약 27분</small>`;l.querySelector('input').onchange=e=>{e.target.checked?S.checks[key(s.id,n)]=1:delete S.checks[key(s.id,n)];save();render()};list.appendChild(l)});c.querySelector('.all').onclick=()=>{lectures.forEach(n=>S.checks[key(s.id,n)]=1);save();render()};c.querySelector('.clear').onclick=()=>{lectures.forEach(n=>delete S.checks[key(s.id,n)]);save();render()};target.appendChild(c)}
function header(){let t=new Date,e=date(S.examDate),n=diff(e,t),i=info(t),known=S.subjects.filter(s=>s.total),total=known.reduce((a,s)=>a+s.total,0),done=known.reduce((a,s)=>a+Math.min(checked(s),s.total),0);$('dday').childNodes[0].nodeValue=(n>=0?'D-':'D+')+Math.abs(n);$('examLabel').textContent=S.examDate.replaceAll('-','.');$('startStat').textContent=S.startDate.slice(5).replace('-','.');$('todayStat').textContent=i.done+'/'+i.total;$('allStat').textContent=total?Math.round(done/total*100)+'%':'0%'}
function today(){let t=new Date,st=date(S.startDate),i=info(t),box=$('todayContent');$('todayDate').textContent=fmt(t);box.innerHTML='';if(t<st){$('todayTitle').textContent='공부 시작 전';$('cycleBadge').textContent='시작 D-'+diff(st,t);$('timeStat').textContent='0분';$('rateStat').textContent='0%';box.innerHTML=`<div class="empty">공부 시작일은 <b>${fmt(st)}</b>입니다.</div>`;return}$('rateStat').textContent=(i.total?Math.round(i.done/i.total*100):0)+'%';let coCount=i.co.reduce((a,x)=>a+x.lectures.length,0);if(i.c===3){$('todayTitle').textContent=i.co.length?'전체 복습 + 이월 강의':'오늘은 전체 복습';$('cycleBadge').textContent='4일차';$('timeStat').textContent=`${60+coCount*27}~${90+coCount*27}분`}else{$('todayTitle').textContent=i.co.length?'오늘 할 인강 + 이월':'오늘 할 인강';$('cycleBadge').textContent=(i.c+1)+'일차';$('timeStat').textContent=Math.round(i.total*40/1.5)+'분'}if(i.co.length){let h=document.createElement('div');h.className='carry-title';h.innerHTML='<b>이월된 강의</b><div class="muted">이전에 체크하지 못한 강의만 자동으로 넘어왔어요.</div>';box.appendChild(h);i.co.forEach(x=>subjectCard(x.s,x.lectures,`이월 · ${fmt(x.date)} · ${x.lectures[0]}~${x.lectures.at(-1)}강`,box))}if(i.c===3){let r=document.createElement('div');r.className='subject review';r.innerHTML='<h3>6과목 전체 복습</h3><div class="muted">공식·요약·틀린 문제를 확인한 뒤 체크하세요.</div><div class="checks"></div>';let list=r.querySelector('.checks');S.subjects.forEach(s=>{let k=iso(t)+':'+s.id,on=!!S.reviews[k],l=document.createElement('label');l.className='check '+(on?'on':'');l.innerHTML=`<input type="checkbox" ${on?'checked':''}><span class="box">${on?'✓':''}</span><span>${s.name}</span>`;l.querySelector('input').onchange=e=>{e.target.checked?S.reviews[k]=1:delete S.reviews[k];save();render()};list.appendChild(l)});box.appendChild(r);return}i.subs.forEach(x=>subjectCard(x.s,x.r,`${x.r[0]}~${x.r.at(-1)}강 · 1.5배속`,box));if(!i.co.length&&!i.subs.length)box.innerHTML='<div class="empty">오늘 배정 과목은 모두 완강했습니다.</div>'}
function progress(){let p=$('progress');p.innerHTML='';S.subjects.forEach(s=>{let d=checked(s),pc=s.total?Math.round(Math.min(d,s.total)/s.total*100):0,x=document.createElement('div');x.className='progress';x.innerHTML=`<div class="prow"><span>${s.name}</span><span>${s.total?Math.min(d,s.total)+'/'+s.total+'강':d+'강 체크'}</span></div><div class="bar"><i style="width:${pc}%"></i></div>`;p.appendChild(x)})}
function schedule(){let l=$('scheduleList'),from=date(S.startDate);l.innerHTML='';for(let i=0;i<32;i++){let d=add(from,i),c=cycle(d),x=document.createElement('div');x.className='schedule '+(c===3?'review':'');x.innerHTML=`<div class="row"><b>${fmt(d)}</b><span>${c===3?'복습':(c+1)+'일차'}</span></div><div class="chips"></div>`;let ch=x.querySelector('.chips');if(c===3)ch.innerHTML='<span class="chip">6과목 전체 복습</span>';else S.subjects.filter(s=>s.day===c).forEach(s=>{let r=range(s,d);if(r&&r.length)ch.innerHTML+=`<span class="chip">${s.name} ${r[0]}~${r.at(-1)}강</span>`});l.appendChild(x)}}
function settings(){$('startDate').value=S.startDate;$('examDate').value=S.examDate;let w=$('subjectSettings');w.innerHTML='';S.subjects.forEach((s,i)=>{let x=document.createElement('div');x.className='setting';x.innerHTML=`<h3>${s.name}</h3><div class="grid"><div class="field"><label>총 강의 수</label><input type="number" min="1" value="${s.total??''}" data-i="${i}" data-f="total"></div><div class="field"><label>해당 날짜 강의 수</label><select data-i="${i}" data-f="per"><option value="2" ${s.per===2?'selected':''}>2강</option><option value="3" ${s.per===3?'selected':''}>3강</option></select></div></div>`;w.appendChild(x)})}
function render(){header();today();progress();schedule();settings()}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button,.view').forEach(x=>x.classList.remove('on'));b.classList.add('on');$(b.dataset.v).classList.add('on');scrollTo(0,0)});$('saveBtn').onclick=()=>{S.startDate=$('startDate').value||DEF.startDate;S.examDate=$('examDate').value||DEF.examDate;document.querySelectorAll('[data-i]').forEach(e=>S.subjects[+e.dataset.i][e.dataset.f]=e.value===''?null:+e.value);save();render();alert('저장했어요.')};$('resetBtn').onclick=()=>{if(confirm('모든 강의와 복습 체크를 초기화할까요?')){S.checks={};S.reviews={};save();render()}};render();
</script></body></html>
